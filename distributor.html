body{background:var(--void);color:var(--white);font-family:'JetBrains Mono',monospace;min-height:100vh;}

.nav-right{display:flex;gap:8px;align-items:center;}
.nav-btn{background:transparent;border:1px solid rgba(153,69,255,.4);color:var(--lav);font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 14px;cursor:pointer;font-weight:600;transition:all .2s;}
.nav-btn:hover{background:rgba(153,69,255,.15);}
.nav-btn.connected{background:rgba(20,241,149,.1);border-color:rgba(20,241,149,.4);color:var(--green);}

.gate-icon{font-size:64px;margin-bottom:24px;filter:drop-shadow(0 0 30px rgba(153,69,255,.5));}
.gate-title{font-family:'Press Start 2P',monospace;font-size:14px;color:var(--gold);margin-bottom:16px;letter-spacing:2px;}
.gate-msg{font-size:13px;color:var(--muted);max-width:500px;line-height:1.8;margin-bottom:24px;}
.gate-btn{background:linear-gradient(135deg,var(--lav),#e879f9);border:none;color:#fff;font-family:'Press Start 2P',monospace;font-size:8px;padding:14px 28px;cursor:pointer;letter-spacing:1px;transition:all .2s;}
.gate-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(153,69,255,.4);}
#gateError{margin-top:16px;font-size:12px;color:var(--red);display:none;}
.app{display:flex;height:calc(100vh - 52px);}
.content{flex:1;padding:20px;overflow-y:auto;}
.sidebar{width:340px;border-left:1px solid rgba(153,69,255,.15);background:rgba(0,0,0,.3);display:flex;flex-direction:column;}
.sidebar-header{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.06);font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:flex;justify-content:space-between;}

.step.done{border-color:rgba(20,241,149,.3);background:rgba(20,241,149,.04);}
.step.locked{opacity:.35;}
.step-num{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;border:2px solid rgba(255,255,255,.1);color:var(--muted);}

.step.done .step-num{border-color:var(--green);color:var(--green);background:rgba(20,241,149,.1);}

.step.done .step-name{color:var(--green);}

.btn-primary{background:linear-gradient(135deg,#9945FF,#7B3FCC);color:#fff;}
.btn-success{background:linear-gradient(135deg,#14F195,#0DB877);color:#000;}
.btn-danger{background:linear-gradient(135deg,#FF4545,#CC3636);color:#fff;}

.btn-gold{background:linear-gradient(135deg,var(--gold),#e6a800);color:#000;}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.btn:hover:not(:disabled){filter:brightness(1.15);transform:translateY(-1px);}
.btn-lg{padding:14px 28px;font-size:13px;font-weight:700;}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.stat-box{background:rgba(153,69,255,.06);border-radius:8px;padding:14px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;background:linear-gradient(135deg,#9945FF,#14F195);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.stat-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}
.w-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;margin-bottom:4px;background:rgba(255,255,255,.015);border:1px solid rgba(255,255,255,.04);flex-wrap:wrap;}
.w-label{font-weight:700;font-size:11px;min-width:70px;color:var(--lav);}
.badge{padding:2px 8px;border-radius:4px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
.badge-ready{background:rgba(120,120,140,.2);color:#78788c;}
.badge-funded{background:rgba(20,241,149,.15);color:#14F195;}
.badge-bought{background:rgba(153,69,255,.25);color:#b380ff;}
.badge-sold{background:rgba(255,193,7,.25);color:#ffc107;}
.badge-swept{background:rgba(20,241,149,.3);color:#14F195;}
.badge-closed{background:rgba(120,120,140,.3);color:#555;}
.token-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;cursor:pointer;margin-bottom:4px;background:rgba(255,255,255,.015);border:1px solid rgba(255,255,255,.04);transition:all .15s;}
.token-item:hover{background:rgba(153,69,255,.1);}
.token-item.selected{background:rgba(20,241,149,.08);border-color:rgba(20,241,149,.3);}
.addr-hl{font-size:13px;color:var(--cyan);font-weight:700;word-break:break-all;padding:10px;background:rgba(34,211,238,.05);border:1px solid rgba(34,211,238,.2);border-radius:6px;margin:8px 0;cursor:pointer;}
.addr-hl:hover{background:rgba(34,211,238,.1);}
.toast{position:fixed;bottom:22px;right:22px;z-index:2000;background:rgba(12,10,24,.97);border:1px solid var(--lav);padding:11px 16px;font-size:11px;max-width:320px;line-height:1.7;transform:translateX(200%);transition:transform .35s ease;}
.toast.show{transform:translateX(0);}
@media(max-width:780px){.app{flex-direction:column;}.sidebar{width:100%;max-height:200px;border-left:none;border-top:1px solid rgba(153,69,255,.15);}.grid3{grid-template-columns:1fr;}}
</style>

  if(typeof window!=='undefined')window.Buffer=B;
  if(typeof global!=='undefined')global.Buffer=B;

<script>
const CA='7QaSvPcEpdDNPeMFxp591axQ7cNyca8h1Su79ckzpump',PIXEL_MINT=CA,
TREASURY='9LABvUXzxnQghFCnjVETzAPBwhFAb4UT2qSVsFvHViHk',

LAMPORTS=1e9,FEE_PER_WALLET=0.005,MAX_WALLETS=1000,TX_FEE_RESERVE=0.01,JUP='https://quote-api.jup.ag/v6';
let userPub=null,walletObj=null,phase='configure',
masterWallet=null,collectWallet=null,subWallets=[],
tokenMint='',tokenInfo=null,walletCount=5,solPerWallet=0.05,slippage=1,
solPrice=170,pixelPrice=0,feePaid=false;
const B58='123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
function b58e(b){const d=[0];for(let i=0;i<b.length;i++){let c=b[i];for(let j=0;j<d.length;j++){c+=d[j]<<8;d[j]=c%58;c=(c/58)|0;}while(c){d.push(c%58);c=(c/58)|0;}}let s='';for(let i=0;i<b.length&&b[i]===0;i++)s+='1';for(let i=d.length-1;i>=0;i--)s+=B58[d[i]];return s;}
// Base58 decoder
function b58d(str){const bytes=[0];for(let i=0;i<str.length;i++){const c=B58.indexOf(str[i]);if(c<0)throw new Error('Bad b58');let carry=c;for(let j=0;j<bytes.length;j++){carry+=bytes[j]*58;bytes[j]=carry&0xff;carry>>=8;}while(carry){bytes.push(carry&0xff);carry>>=8;}}for(let i=0;i<str.length&&str[i]==='1';i++)bytes.push(0);return new Uint8Array(bytes.reverse());}
// Reconstruct Solana Keypair from our stored b58 secretKey
const DEV_WALLET='9LABvUXzxnQghFCnjVETzAPBwhFAb4UT2qSVsFvHViHk';
function toKeypair(w){
  if(!w||!w.secretKey) throw new Error('No wallet or secret key provided');
  if(!window.solanaWeb3) throw new Error('Solana web3 not loaded');
  try{
    const raw=b58d(w.secretKey);
    if(raw.length!==64) throw new Error('Invalid key length: '+raw.length+' (expected 64)');
    return window.solanaWeb3.Keypair.fromSecretKey(raw);
  }catch(e){
    throw new Error('Keypair error: '+e.message);
  }
}
function getConn(altUrl){
  if(!window.solanaWeb3) throw new Error('Solana web3 not loaded — refresh page');
  const url=altUrl||RPC_URL||DEFAULT_RPC;
  if(!url) throw new Error('No RPC URL configured');
  return new window.solanaWeb3.Connection(url,{commitment:'confirmed',confirmTransactionInitialTimeout:60000});
}
async function getConnWithFallback(){
  const urls=[RPC_URL,DEFAULT_RPC,'https://rpc.ankr.com/solana'];
  for(const url of urls){
    try{
      const c=getConn(url);
      await c.getLatestBlockhash();
      if(url!==RPC_URL){log('Using fallback RPC: '+url.slice(0,30)+'...');RPC_URL=url;}
      return c;
    }catch(e){continue;}
  }
  throw new Error('All RPCs unreachable — paste a Helius or QuickNode RPC URL in settings');
}
async function makeWallet(){try{const kp=await crypto.subtle.generateKey('Ed25519',true,['sign','verify']);const pub=new Uint8Array(await crypto.subtle.exportKey('raw',kp.publicKey));const priv=new Uint8Array(await crypto.subtle.exportKey('pkcs8',kp.privateKey));const seed=priv.slice(16,48);const sk=new Uint8Array(64);sk.set(seed,0);sk.set(pub,32);return{publicKey:b58e(pub),secretKey:b58e(sk),_kp:kp};}catch{const s=new Uint8Array(32);crypto.getRandomValues(s);const p=new Uint8Array(32);crypto.getRandomValues(p);return{publicKey:b58e(p),secretKey:b58e(new Uint8Array([...s,...p])),_kp:null};}}
const DEFAULT_RPC='https://api.mainnet-beta.solana.com';
let RPC_URL=localStorage.getItem('pw_dist_rpc')||DEFAULT_RPC;
async function rpc(m,p=[]){
  try{
    const controller=new AbortController();
    const timeout=setTimeout(()=>controller.abort(),15000);
    const r=await fetch(RPC_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({jsonrpc:'2.0',id:1,method:m,params:p}),signal:controller.signal});
    clearTimeout(timeout);
    if(!r.ok) throw new Error('RPC HTTP '+r.status);
    const d=await r.json();
    if(d.error) throw new Error(d.error.message||'RPC error');
    return d.result;
  }catch(e){
    if(e.name==='AbortError') throw new Error('RPC timeout (15s)');
    throw e;
  }
}
async function getBal(pub){
  try{
    if(!pub||pub.length<32) throw new Error('Invalid pubkey: '+pub);
    const r=await rpc('getBalance',[pub]);
    if(!r||typeof r.value==='undefined') throw new Error('No balance data');
    return r.value/LAMPORTS;
  }catch(e){
    log('Balance check failed for '+((pub||'').slice(0,8))+'...: '+e.message,'error');
    return 0;
  }
}
// Get solana web3 from CDN
function getWeb3(){return window.solanaWeb3||null;}
function getWallets(){const w=[];if(window.phantom?.solana?.isPhantom)w.push({name:'Phantom',obj:window.phantom.solana});else if(window.solana?.isPhantom)w.push({name:'Phantom',obj:window.solana});if(window.solflare?.isSolflare)w.push({name:'Solflare',obj:window.solflare});if(window.backpack?.isBackpack)w.push({name:'Backpack',obj:window.backpack});return w;}
async function connectWallet(){const ws=getWallets();if(!ws.length){showToast('No wallet found');return;}try{const w=ws[0];const r=await w.obj.connect();const pk=r?.publicKey?.toString()||w.obj.publicKey?.toString();if(!pk)throw new Error('No key');userPub=pk;walletObj=w.obj;document.getElementById('walletBtn').textContent='✦ '+pk.slice(0,4)+'...'+pk.slice(-4);document.getElementById('walletBtn').classList.add('connected');log('Connected: '+pk.slice(0,4)+'...'+pk.slice(-4),'success');await checkGate();}catch(e){showToast(e.code===4001?'Cancelled':e.message);}}
async function checkGate(){log('Checking access...');const err=document.getElementById('gateError');try{
// Check 1: pixel ownership via wall-state
const r=await fetch('/api/wall-state');
if(r.ok){

      return po===short || po===userPub || po===userPub.slice(0,4)+'...'+userPub.slice(-4);
    });
    log('Gate: found '+owned.length+' owned pixel(s)');
    if(owned.length>0){log('✦ Verified: '+owned.length+' pixel(s)','success');unlockApp();return;}
  }
}

async function fetchPrices(){try{const r=await fetch('https://api.dexscreener.com/tokens/v1/solana/'+CA);if(!r.ok)return;const d=await r.json();const arr=Array.isArray(d)?d:(d.pairs||[]);if(arr.length){const p=arr[0];if(p.priceUsd)pixelPrice=parseFloat(p.priceUsd);if(p.priceUsd&&p.priceNative){const s=parseFloat(p.priceUsd)/parseFloat(p.priceNative);if(s>10&&s<10000)solPrice=s;}}}catch(e){}}
async function jupQuote(a,b,amt,slip){
  if(!a||!b) throw new Error('Missing mint address');
  if(amt<=0) throw new Error('Amount must be > 0 (got '+amt+')');
  try{
    const controller=new AbortController();
    const timeout=setTimeout(()=>controller.abort(),20000);
    const url=JUP+'/quote?inputMint='+a+'&outputMint='+b+'&amount='+amt+'&slippageBps='+slip;
    const r=await fetch(url,{signal:controller.signal});
    clearTimeout(timeout);
    if(!r.ok){const txt=await r.text().catch(()=>'');throw new Error('Jupiter quote HTTP '+r.status+': '+txt.slice(0,100));}
    const data=await r.json();
    if(!data.outAmount) throw new Error('No output amount in quote');
    return data;
  }catch(e){
    if(e.name==='AbortError') throw new Error('Jupiter quote timeout (20s)');
    throw e;
  }
}
async function jupSwap(q,pub){
  if(!q) throw new Error('No quote provided');
  if(!pub) throw new Error('No public key for swap');
  try{
    const controller=new AbortController();
    const timeout=setTimeout(()=>controller.abort(),30000);
    const r=await fetch(JUP+'/swap',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({quoteResponse:q,userPublicKey:pub,wrapAndUnwrapSol:true,dynamicComputeUnitLimit:true,prioritizationFeeLamports:'auto'}),signal:controller.signal});
    clearTimeout(timeout);
    if(!r.ok){const txt=await r.text().catch(()=>'');throw new Error('Jupiter swap HTTP '+r.status+': '+txt.slice(0,100));}
    const data=await r.json();
    if(!data.swapTransaction) throw new Error('No swap transaction returned');
    return data;
  }catch(e){
    if(e.name==='AbortError') throw new Error('Jupiter swap timeout (30s)');
    throw e;
  }
}

async function searchToken(){
  const q=document.getElementById('tokenSearch')?.value?.trim();
  if(!q)return;
  log('Searching: '+q);
  const el=document.getElementById('searchResults');
  if(!el)return;

  // Route 1: If it looks like a mint address (32+ chars), look up directly
  if(q.length >= 32){
    try{
      // Use DexScreener to get token info by mint
      const r=await fetch('https://api.dexscreener.com/tokens/v1/solana/'+q);
      if(r.ok){
        const data=await r.json();
        const pairs=Array.isArray(data)?data:(data.pairs||[]);
        if(pairs.length>0){
          const p=pairs[0];
          const mint=p.baseToken?.address===q?p.baseToken.address:p.quoteToken?.address;
          const sym=p.baseToken?.address===q?p.baseToken.symbol:p.quoteToken?.symbol;
          const name=p.baseToken?.address===q?p.baseToken.name:p.quoteToken?.name;
          el.innerHTML='<div class="token-item" onclick="selToken(\''+q+'\',\''+sym+'\',6)"><div style="font-weight:700;">'+sym+'</div><div style="font-size:10px;color:var(--muted);">'+name+'</div><div style="margin-left:auto;font-size:10px;color:var(--muted);">'+q.slice(0,8)+'...</div></div>';
          log('Found: '+sym+' ('+name+')','success');
          return;
        }
      }
    }catch(e){}
    // Fallback: just accept the mint as-is
    el.innerHTML='<div class="token-item" onclick="selToken(\''+q+'\',\'UNKNOWN\',6)"><div style="font-weight:700;">Use this mint</div><div style="margin-left:auto;font-size:10px;color:var(--muted);">'+q.slice(0,8)+'...</div></div>';
    log('Mint accepted — select to use','success');
    return;
  }

  // Route 2: Search by name/ticker via DexScreener
  try{
    const r=await fetch('https://api.dexscreener.com/latest/dex/search?q='+encodeURIComponent(q));
    if(!r.ok) throw new Error('Search API error');
    const data=await r.json();
    const pairs=data.pairs||[];
    // Deduplicate by base token address, only Solana
    const seen=new Set();
    const tokens=[];
    for(const p of pairs){
      if(p.chainId!=='solana')continue;
      const addr=p.baseToken?.address;
      if(!addr||seen.has(addr))continue;
      seen.add(addr);
      tokens.push({address:addr, symbol:p.baseToken.symbol, name:p.baseToken.name, priceUsd:p.priceUsd});
      if(tokens.length>=10)break;
    }
    el.innerHTML=tokens.map(t=>
      '<div class="token-item" onclick="selToken(\''+t.address+'\',\''+t.symbol.replace(/'/g,'')+'\',6)">'+
      '<div><div style="font-weight:700;">'+t.symbol+'</div><div style="font-size:10px;color:var(--muted);">'+t.name+'</div></div>'+
      '<div style="margin-left:auto;text-align:right;"><div style="font-size:10px;color:var(--green);">$'+(t.priceUsd||'?')+'</div><div style="font-size:9px;color:var(--muted);">'+t.address.slice(0,8)+'...</div></div></div>'
    ).join('');
    log('Found '+tokens.length+' Solana tokens','success');
  }catch(e){
    log('Search failed: '+e.message,'error');
    el.innerHTML='<div style="color:var(--red);font-size:11px;padding:10px;">Search failed. Try pasting the mint address directly.</div>';
  }
}

async function startPay(method){
  if(!tokenMint){showToast('Select token first');return;}
  if(!walletObj){showToast('Connect wallet first');return;}
  if(!window.solanaWeb3){showToast('Solana library not loaded');log('web3 missing','error');return;}

  const fee=walletCount*FEE_PER_WALLET;
  const fundAmount=walletCount*(solPerWallet+TX_FEE_RESERVE);
  const isDev=userPub===DEV_WALLET;

  // Create wallets first
  log('Creating master + '+walletCount+' burner wallets...');
  masterWallet=await makeWallet();
  log('Master: '+masterWallet.publicKey.slice(0,8)+'...');
  subWallets=[];
  for(let i=0;i<walletCount;i++){
    const w=await makeWallet();
    subWallets.push({...w,label:'Burner-'+String(i+1).padStart(3,'0'),solBalance:0,tokenBalance:0,status:'ready'});
  }
  log(walletCount+' burner wallets created','success');

  // Build the transaction
  try{
    const {PublicKey,Transaction,SystemProgram}=window.solanaWeb3;
    const tx=new Transaction();

    if(!isDev){
      tx.add(SystemProgram.transfer({
        fromPubkey:new PublicKey(userPub),
        toPubkey:new PublicKey(TREASURY),
        lamports:Math.round(fee*LAMPORTS),
      }));
      log('Fee: '+fee.toFixed(4)+' SOL → treasury');
    } else {
      log('✦ Dev wallet — fee waived','success');
    }

    tx.add(SystemProgram.transfer({
      fromPubkey:new PublicKey(userPub),
      toPubkey:new PublicKey(masterWallet.publicKey),
      lamports:Math.round(fundAmount*LAMPORTS),
    }));

    const totalCharge=isDev?fundAmount:(fee+fundAmount);
    log('Total charge: '+totalCharge.toFixed(4)+' SOL');
    showToast('Approve '+totalCharge.toFixed(4)+' SOL in wallet...');

    // Get blockhash — try multiple RPCs
    log('Getting blockhash (RPC: '+RPC_URL.slice(0,40)+'...)');
    let blockhash,lastValidBlockHeight;
    const rpcsToTry=[RPC_URL,'https://api.mainnet-beta.solana.com','https://rpc.ankr.com/solana','https://solana-rpc.publicnode.com'];
    let rpcWorked=false;
    for(const rpcUrl of rpcsToTry){
      try{
        const testConn=new window.solanaWeb3.Connection(rpcUrl,'confirmed');
        const bh=await testConn.getLatestBlockhash('confirmed');
        blockhash=bh.blockhash;
        lastValidBlockHeight=bh.lastValidBlockHeight;
        if(rpcUrl!==RPC_URL) log('Using RPC: '+rpcUrl.slice(0,40)+'...');
        rpcWorked=true;
        break;
      }catch(e){
        log('RPC failed: '+rpcUrl.slice(0,30)+'... ('+e.message.slice(0,40)+')','error');
      }
    }
    if(!rpcWorked) throw new Error('All RPCs failed — paste a working Helius RPC URL in settings');

    tx.recentBlockhash=blockhash;
    tx.feePayer=new PublicKey(userPub);

    // Send via Phantom — prefer signAndSendTransaction
    let sig;
    if(walletObj.signAndSendTransaction){
      log('Sending via Phantom...');
      const result=await walletObj.signAndSendTransaction(tx);
      sig=typeof result==='string'?result:(result.signature||result.publicKey||result);
      log('TX sent: '+String(sig).slice(0,16)+'...');
    } else {
      log('Signing + sending manually...');
      const signed=await walletObj.signTransaction(tx);
      const sendConn=new window.solanaWeb3.Connection(rpcsToTry.find(u=>u)||RPC_URL,'confirmed');
      sig=await sendConn.sendRawTransaction(signed.serialize());
      log('TX sent: '+String(sig).slice(0,16)+'...');
    }

    // Confirm
    log('Confirming...');
    const confirmConn=new window.solanaWeb3.Connection(rpcsToTry.find(u=>u)||RPC_URL,'confirmed');
    await confirmConn.confirmTransaction({signature:String(sig),blockhash,lastValidBlockHeight},'confirmed');
    log('✦ Confirmed! Master funded with '+fundAmount.toFixed(4)+' SOL','success');

  }catch(e){
    if(e.code===4001||e.message?.includes('User rejected')){
      showToast('Cancelled');log('User cancelled','error');
    } else {
      log('Payment error: '+e.message,'error');
      showToast('Failed: '+(e.message||'').slice(0,60));
    }
    masterWallet=null;subWallets=[];
    return;
  }

  feePaid=true;
  phase='funded';
  render();
}

async function checkMaster(){if(!masterWallet)return;try{const bal=await getBal(masterWallet.publicKey);const needed=walletCount*(solPerWallet+TX_FEE_RESERVE);const el=document.getElementById('masterBal');const btn=document.getElementById('distBtn');if(el)el.innerHTML='Balance: <span style="color:'+(bal>=needed*0.95?'var(--green)':'var(--orange)')+';">'+bal.toFixed(4)+' SOL</span> (need '+needed.toFixed(4)+')';if(btn)btn.disabled=bal<needed*0.95;log('Master: '+bal.toFixed(4)+' SOL');}catch(e){log('Error: '+e.message,'error');}}

async function distribute(){
  if(!window.solanaWeb3){log('Solana library not loaded','error');showToast('Refresh page');return;}
  if(!masterWallet||!masterWallet.secretKey){log('No master wallet','error');return;}
  if(!subWallets.length){log('No burner wallets','error');return;}
  log('═══ DISTRIBUTING + CLOSING MASTER ═══','success');
  const {PublicKey,Transaction,SystemProgram}=window.solanaWeb3;
  const conn=await getConnWithFallback();
  const masterKp=toKeypair(masterWallet);
  const lamportsEach=Math.round((solPerWallet+TX_FEE_RESERVE)*LAMPORTS);
  const BATCH=8;
  try{
    for(let b=0;b<subWallets.length;b+=BATCH){
      const batch=subWallets.slice(b,b+BATCH);
      const tx=new Transaction();
      for(const w of batch){
        tx.add(SystemProgram.transfer({fromPubkey:masterKp.publicKey,toPubkey:new PublicKey(w.publicKey),lamports:lamportsEach}));
      }
      const {blockhash}=await conn.getLatestBlockhash();
      tx.recentBlockhash=blockhash;tx.feePayer=masterKp.publicKey;tx.sign(masterKp);
      const sig=await conn.sendRawTransaction(tx.serialize());
      await conn.confirmTransaction(sig,'confirmed');
      batch.forEach(w=>{w.solBalance=solPerWallet+TX_FEE_RESERVE;w.status='funded';});
      log('  Batch '+(Math.floor(b/BATCH)+1)+': '+batch.length+' burners funded ('+sig.slice(0,8)+'...)','success');
    }
    const masterBal=await conn.getBalance(masterKp.publicKey);
    if(masterBal>5000){
      const dtx=new Transaction().add(SystemProgram.transfer({fromPubkey:masterKp.publicKey,toPubkey:new PublicKey(userPub),lamports:masterBal-5000}));
      const {blockhash:bh2}=await conn.getLatestBlockhash();dtx.recentBlockhash=bh2;dtx.feePayer=masterKp.publicKey;dtx.sign(masterKp);
      await conn.sendRawTransaction(dtx.serialize());
      log('  Master dust returned','success');
    }
    log('✦ Master closed. '+subWallets.length+' burners ready.','success');
  }catch(e){log('Distribute error: '+e.message,'error');showToast('Error: '+e.message?.slice(0,60));return;}
  phase='distributed';render();
}

async function buyOne(i){
  if(i<0||i>=subWallets.length){log('Invalid wallet index: '+i,'error');return;}
  const w=subWallets[i];
  if(!w||!w.secretKey){log('Wallet '+i+' has no key','error');return;}
  if(!tokenMint){log('No token selected','error');return;}
  if(!window.solanaWeb3){log('Solana library not loaded','error');return;}
  log('[BUY] '+w.label+'...');
  try{
    const conn=await getConnWithFallback();const kp=toKeypair(w);
    // Reserve 0.015 SOL for sell TX fee + sweep fee
    const bal=await conn.getBalance(kp.publicKey);
    const reserve=Math.round(TX_FEE_RESERVE*LAMPORTS);
    const amt=bal-reserve;
    if(amt<=0){log('  Not enough SOL (need '+TX_FEE_RESERVE+' reserve for fees)','error');return;}
    const q=await jupQuote(SOL_MINT,tokenMint,amt,slippage*100);
    const dec=tokenInfo?.decimals||6;
    const outAmt=parseFloat(q.outAmount)/Math.pow(10,dec);
    log('  Quote: ~'+outAmt.toLocaleString()+' '+(tokenInfo?.symbol||'tokens'));
    const swapData=await jupSwap(q,w.publicKey);
    const txBuf=Uint8Array.from(atob(swapData.swapTransaction),c=>c.charCodeAt(0));
    const vtx=window.solanaWeb3.VersionedTransaction.deserialize(txBuf);
    vtx.sign([kp]);
    const sig=await conn.sendRawTransaction(vtx.serialize(),{skipPreflight:true,maxRetries:3});
    await conn.confirmTransaction(sig,'confirmed');
    subWallets[i].tokenBalance=outAmt;subWallets[i].solBalance=TX_FEE_RESERVE;subWallets[i].status='bought';
    log('  ✓ Bought! TX: '+sig.slice(0,12)+'...','success');
  }catch(e){log('  Error: '+e.message,'error');}
  render();
}
async function buyAll(){log('═══ BUYING ALL ═══','success');for(let i=0;i<subWallets.length;i++){if(subWallets[i].status==='funded')await buyOne(i);}log('═══ COMPLETE ═══','success');phase='bought';render();}

async function sellOne(i){
  if(i<0||i>=subWallets.length){log('Invalid wallet index: '+i,'error');return;}
  const w=subWallets[i];
  if(!w||!w.secretKey){log('Wallet '+i+' has no key','error');return;}
  if(!window.solanaWeb3){log('Solana library not loaded','error');return;}
  log('[SELL] '+w.label+'...');
  try{
    if(!w.tokenBalance){log('No tokens','error');return;}
    const conn=await getConnWithFallback();const kp=toKeypair(w);
    const raw=Math.floor(w.tokenBalance*Math.pow(10,tokenInfo?.decimals||6));
    const q=await jupQuote(tokenMint,SOL_MINT,raw,slippage*100);
    const solOut=(parseFloat(q.outAmount)/LAMPORTS).toFixed(4);
    log('  Quote: ~'+solOut+' SOL');
    const swapData=await jupSwap(q,w.publicKey);
    const txBuf=Uint8Array.from(atob(swapData.swapTransaction),c=>c.charCodeAt(0));
    const vtx=window.solanaWeb3.VersionedTransaction.deserialize(txBuf);
    vtx.sign([kp]);
    const sig=await conn.sendRawTransaction(vtx.serialize(),{skipPreflight:true,maxRetries:3});
    await conn.confirmTransaction(sig,'confirmed');
    subWallets[i].solBalance=parseFloat(solOut);subWallets[i].tokenBalance=0;subWallets[i].status='sold';
    log('  ✓ Sold! '+solOut+' SOL ('+sig.slice(0,12)+'...)','success');
  }catch(e){log('  Error: '+e.message,'error');}
  render();
}
async function sellAll(){log('═══ SELLING ALL ═══','success');for(let i=0;i<subWallets.length;i++){if(subWallets[i].status==='bought')await sellOne(i);}log('═══ COMPLETE ═══','success');render();}

async function collectReturn(){
  if(!window.solanaWeb3){log('Solana library not loaded','error');return;}
  if(!subWallets.length){log('No wallets to collect from','error');return;}
  log('═══ COLLECTING ═══','success');
  collectWallet=await makeWallet();
  log('Collection wallet: '+collectWallet.publicKey.slice(0,8)+'...');
  const {PublicKey,Transaction,SystemProgram}=window.solanaWeb3;
  const conn=await getConnWithFallback();let total=0;
  for(let i=0;i<subWallets.length;i++){
    const w=subWallets[i];
    try{
      const kp=toKeypair(w);const bal=await conn.getBalance(kp.publicKey);
      if(bal<=5000){w.status='swept';continue;}
      const tx=new Transaction().add(SystemProgram.transfer({fromPubkey:kp.publicKey,toPubkey:new PublicKey(collectWallet.publicKey),lamports:bal-5000}));
      const {blockhash}=await conn.getLatestBlockhash();tx.recentBlockhash=blockhash;tx.feePayer=kp.publicKey;tx.sign(kp);
      const sig=await conn.sendRawTransaction(tx.serialize());await conn.confirmTransaction(sig,'confirmed');
      const swept=(bal-5000)/LAMPORTS;total+=swept;w.solBalance=0;w.status='swept';
      log('  '+w.label+': '+swept.toFixed(4)+' SOL → collection','success');
    }catch(e){log('  '+w.label+' error: '+e.message,'error');}
  }
  log('✦ Collected: '+total.toFixed(4)+' SOL','success');
  phase='collected';render();
  setTimeout(()=>{const el=document.getElementById('collectBal');if(el)el.textContent=total.toFixed(4);},100);
}

async function returnClose(){
  if(!window.solanaWeb3){log('Solana library not loaded','error');return;}
  if(!collectWallet||!collectWallet.secretKey){log('No collection wallet','error');return;}
  if(!userPub){log('No user wallet connected','error');return;}
  if(!confirm('⚠️ This will PERMANENTLY DESTROY all wallet keys.\n\nHave you saved the key backup file?\n\nClick OK to proceed or Cancel to go back and save first.')){return;}
  log('═══ RETURNING FUNDS ═══','success');
  const {PublicKey,Transaction,SystemProgram}=window.solanaWeb3;
  const conn=await getConnWithFallback();
  try{
    const kp=toKeypair(collectWallet);const bal=await conn.getBalance(kp.publicKey);
    if(bal>5000){
      const tx=new Transaction().add(SystemProgram.transfer({fromPubkey:kp.publicKey,toPubkey:new PublicKey(userPub),lamports:bal-5000}));
      const {blockhash}=await conn.getLatestBlockhash();tx.recentBlockhash=blockhash;tx.feePayer=kp.publicKey;tx.sign(kp);
      const sig=await conn.sendRawTransaction(tx.serialize());await conn.confirmTransaction(sig,'confirmed');
      log('✦ '+((bal-5000)/LAMPORTS).toFixed(4)+' SOL returned ('+sig.slice(0,12)+'...)','success');
    }
  }catch(e){log('Return error: '+e.message,'error');}
  masterWallet=null;collectWallet=null;subWallets=[];
  phase='done';feePaid=false;
  log('✦ All wallets destroyed. Session closed.','success');render();
}
async function testRPC(){
  log('Testing RPC: '+RPC_URL.slice(0,50)+'...');
  try{
    const c=new window.solanaWeb3.Connection(RPC_URL,'confirmed');
    const bh=await c.getLatestBlockhash('confirmed');
    log('✦ RPC works! Blockhash: '+bh.blockhash.slice(0,12)+'...','success');
    showToast('✦ RPC connection OK');
  }catch(e){
    log('✕ RPC failed: '+e.message,'error');
    showToast('RPC failed — check URL');
  }
}

function exportKeys(){
  if(!subWallets.length && !masterWallet){showToast('No wallets to export');return;}
  const data={
    exported: new Date().toISOString(),
    userWallet: userPub,
    token: tokenInfo?.symbol || tokenMint || 'unknown',
    master: masterWallet ? {publicKey:masterWallet.publicKey, secretKey:masterWallet.secretKey} : null,
    collection: collectWallet ? {publicKey:collectWallet.publicKey, secretKey:collectWallet.secretKey} : null,
    burners: subWallets.map(w=>({label:w.label, publicKey:w.publicKey, secretKey:w.secretKey, status:w.status})),
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  a.download='pixelwalls-burners-'+Date.now()+'.json';a.click();
  URL.revokeObjectURL(url);
  log('✦ Keys exported to JSON file','success');
  showToast('✦ Keys saved! Keep this file safe.');
}

function resetSession(){
  if(subWallets.length>0 && !confirm('⚠️ Starting a new session will DESTROY all current wallet keys.\n\nHave you saved the backup?')){return;}phase='configure';masterWallet=null;collectWallet=null;subWallets=[];feePaid=false;log('Session reset.');render();}
async function refreshAll(){log('Refreshing...');for(let i=0;i<subWallets.length;i++){try{subWallets[i].solBalance=await getBal(subWallets[i].publicKey);}catch(e){}}log('Done','success');render();}

const logC={info:'#b0b0bc',success:'#14F195',error:'#FF4545'};
function log(msg,type='info'){const ts=new Date().toLocaleTimeString();const b=document.getElementById('logBody');if(!b)return;const d=document.createElement('div');d.className='log-entry';d.style.color=logC[type]||logC.info;d.innerHTML='<span style="color:#555;margin-right:6px;">'+ts+'</span>'+msg;b.appendChild(d);b.scrollTop=b.scrollHeight;while(b.children.length>300)b.removeChild(b.firstChild);}
function clearLogs(){const b=document.getElementById('logBody');if(b)b.innerHTML='';}
// Global error handler — catches anything we missed
window.addEventListener('unhandledrejection',e=>{
  log('Unhandled error: '+(e.reason?.message||e.reason||'unknown'),'error');
  console.error('Unhandled:',e.reason);
});
window.onerror=function(msg,src,line){
  log('JS error: '+msg+' (line '+line+')','error');
  return false;
};

function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3800);}

window.addEventListener('load',async()=>{
  // Verify web3.js loaded from CDN
  if(!window.solanaWeb3){
    log('⚠️ Solana web3.js failed to load — transactions will not work','error');
    showToast('Warning: Solana library failed to load');
  } else {
    log('Solana web3.js loaded ✓');
  }
for(const w of getWallets()){try{if(w.obj.isConnected&&w.obj.publicKey){userPub=w.obj.publicKey.toString();walletObj=w.obj;document.getElementById('walletBtn').textContent='✦ '+userPub.slice(0,4)+'...'+userPub.slice(-4);document.getElementById('walletBtn').classList.add('connected');await checkGate();break;}}catch(e){}}});
</script>
