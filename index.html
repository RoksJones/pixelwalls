<body>

      <a href="https://solscan.io/account/A2o487PSnxgiHE8TuWW3tySUQHdRsXEi5o9PaSJdPMcW" target="_blank" style="color:var(--cyan);">Pool 2</a>

<script>
// ==================== UPDATED SCRIPT SECTION ====================

// -- CONFIG ------------------------------------------------
const DEVNET_MODE = false;
const CA = '7QaSvPcEpdDNPeMFxp591axQ7cNyca8h1Su79ckzpump';
const PAIR = 'HNUVY8vDKMy4S2sNmRtJ7wVY5GogPYgKJh1uNo3oPWfE';
let SOL_USD = 170; // fallback

// Safe element getter
function el(id) { return document.getElementById(id); }

// ==================== IMPROVED SOL PRICE FETCH ====================
async function fetchSolPrice() {
  console.log('🔄 Fetching live SOL price...');
  
  const sources = [
    // 1. CoinGecko (most reliable)
    async () => {
      const r = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=solana&vs_currencies=usd');
      if (!r.ok) throw new Error('CoinGecko failed');
      const d = await r.json();
      return d?.solana?.usd;
    },
    // 2. Jupiter Price API
    async () => {
      const r = await fetch('https://price.jup.ag/v6/price?ids=So11111111111111111111111111111111111111112');
      if (!r.ok) throw new Error('Jupiter failed');
      const d = await r.json();
      return d?.data?.['So11111111111111111111111111111111111111112']?.price;
    },
    // 3. Birdeye public (no key needed for basic price)
    async () => {
      const r = await fetch('https://public-api.birdeye.so/defi/price?address=So11111111111111111111111111111111111111112', {
        headers: { 'x-chain': 'solana' }
      });
      if (!r.ok) throw new Error('Birdeye failed');
      const d = await r.json();
      return d?.data?.value;
    }
  ];

  for (let i = 0; i < sources.length; i++) {
    try {
      const price = await sources[i]();
      if (price && price > 10 && price < 500) {  // sanity check
        SOL_USD = Math.round(price * 100) / 100;
        console.log(`✅ SOL price updated: $${SOL_USD}`);
        updateSolPriceDisplay();
        return SOL_USD;
      }
    } catch (e) {
      console.warn(`⚠️ SOL price source ${i+1} failed:`, e.message);
    }
  }
  
  console.warn('❌ All SOL price sources failed. Using last known value:', SOL_USD);
  showToast('⚠️ Could not fetch live SOL price — using cached value');
  return SOL_USD;
}

function updateSolPriceDisplay() {
  // Update claim modal if open
  const claimUsd = el('claimUsd');
  if (claimUsd && claimUsd.textContent.includes('≈ $')) {
    const priceText = el('claimPrice')?.textContent || '0';
    const sol = parseFloat(priceText) || 0;
    if (sol > 0) claimUsd.textContent = `≈ $${(sol * SOL_USD).toFixed(2)} · 90% treasury · 10% agent`;
  }
  
  // Update sidebar price if visible
  const infoPrice = el('infoPrice');
  if (infoPrice && infoPrice.textContent.includes('SOL')) {
    const match = infoPrice.textContent.match(/([\d.]+) SOL/);
    if (match) {
      const sol = parseFloat(match[1]);
      if (sol > 0) {
        const newText = infoPrice.textContent.replace(/≈ \$\d+\.\d+/, `≈ $${(sol * SOL_USD).toFixed(2)}`);
        infoPrice.textContent = newText;
      }
    }
  }
}

// ==================== IMPROVED TOKEN DATA FETCH ====================
async function fetchTokenData() {
  console.log('🔄 Fetching $PIXEL market data...');
  let success = false;

  // Try DexScreener pair directly
  try {
    const r = await fetch(`https://api.dexscreener.com/latest/dex/pairs/solana/${PAIR}`);
    if (r.ok) {
      const d = await r.json();
      const pair = d?.pair || d?.pairs?.[0];
      if (pair) {
        applyDexData(pair);
        success = true;
      }
    }
  } catch (e) { console.warn('DexScreener pair fetch failed', e); }

  // Fallback to token search
  if (!success) {
    try {
      const r = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${CA}`);
      if (r.ok) {
        const d = await r.json();
        const pair = d?.pairs?.[0];
        if (pair) {
          applyDexData(pair);
          success = true;
        }
      }
    } catch (e) { console.warn('DexScreener token fallback failed', e); }
  }

  // Pump.fun fallback
  if (!success) {
    try {
      const r = await fetch(`https://frontend-api.pump.fun/coins/${CA}`);
      if (r.ok) {
        const d = await r.json();
        // handle pump data...
        if (d.usd_market_cap) el('dexMcap').textContent = '$' + abbreviate(d.usd_market_cap);
        console.log('✅ Pump.fun fallback used');
      }
    } catch (e) { console.warn('Pump.fun fallback failed', e); }
  }

  if (!success) {
    showToast('⚠️ Market data fetch failed — check console');
    console.error('All $PIXEL data sources failed');
  }
}

function applyDexData(pair) {
  if (!pair) return;
  
  // Price
  if (pair.priceUsd) {
    const p = parseFloat(pair.priceUsd);
    el('mcap').textContent = p < 0.000001 ? p.toExponential(3) : '$' + p.toFixed(p < 0.01 ? 8 : 6);
    el('statPrice').textContent = el('mcap').textContent;
  }
  
  // Market cap
  if (pair.fdv || pair.marketCap) {
    const mc = '$' + abbreviate(pair.fdv || pair.marketCap);
    el('dexMcap').textContent = mc;
    el('statMcap').textContent = mc;
  }
  
  // Volume, Liquidity, etc. (your existing logic)
  if (pair.volume?.h24) el('vol24').textContent = '$' + abbreviate(pair.volume.h24);
  if (pair.liquidity?.usd) {
    el('dexLiq').textContent = '$' + abbreviate(pair.liquidity.usd);
    el('totalLiq').textContent = '$' + abbreviate(pair.liquidity.usd * 1.1); // rough total estimate
  }
  
  // Price change
  if (pair.priceChange?.h24 != null) {
    const ch = parseFloat(pair.priceChange.h24);
    const elChange = el('dexChange');
    elChange.textContent = (ch >= 0 ? '+' : '') + ch.toFixed(2) + '%';
    elChange.style.color = ch >= 0 ? 'var(--green)' : 'var(--red)';
  }
}

function abbreviate(n) {
  if (n >= 1e9) return (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return n.toFixed(0);
}

// ==================== CLAIM / SELECTION UPDATES ====================
// Your existing claimSpace() and refreshSidebar() functions stay the same,
// but they now benefit from live SOL_USD via updateSolPriceDisplay()

// Call this after any price display update
function refreshPriceDisplays() {
  updateSolPriceDisplay();
}

// ==================== INIT ====================
window.addEventListener('load', async () => {
  console.log('🚀 Pixelwalls initializing...');

  // Fetch prices immediately
  await fetchSolPrice();
  await fetchTokenData();

  // Refresh intervals
  setInterval(fetchSolPrice, 60000);     // SOL every 60s
  setInterval(fetchTokenData, 30000);    // Token data every 30s

  // Existing init calls
  initStars();
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  initOff();
  render();
  await tryAutoReconnect();

  updateSelInfo();
  renderWizardHall();

  // Click anywhere on canvas also triggers price refresh
  document.getElementById('wallCanvas').addEventListener('mouseup', () => {
    setTimeout(refreshPriceDisplays, 100);
  });

  console.log('✅ Initialization complete. SOL price:', SOL_USD);
});

// Keep all your other functions (connectWallet, claimSpace, render, etc.) unchanged
// They will now use the improved live SOL_USD

</script>
