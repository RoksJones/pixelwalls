.fp{position:fixed;width:6px;height:6px;pointer-events:none;z-index:0;opacity:0;animation:fp-rise var(--d,10s) var(--del,0s) linear infinite;}
@keyframes fp-rise{0%{transform:translateY(100vh) rotate(0deg);opacity:0}10%{opacity:.5}90%{opacity:.3}100%{transform:translateY(-100px) rotate(720deg);opacity:0}}
